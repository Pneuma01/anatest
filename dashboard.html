<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Reportes</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="dashboard-page">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#185FA5"/>
          <rect x="8" y="12" width="24" height="3" rx="1.5" fill="white"/>
          <rect x="8" y="19" width="16" height="3" rx="1.5" fill="white" opacity="0.7"/>
          <rect x="8" y="26" width="20" height="3" rx="1.5" fill="white" opacity="0.5"/>
        </svg>
        <span>Portal Reportes</span>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Se genera dinámicamente desde reports.js -->
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" id="user-info">
        <div class="user-avatar" id="user-avatar">U</div>
        <span class="user-email" id="user-email">Cargando...</span>
      </div>
      <button class="btn-logout" id="btn-logout" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- Topbar mobile -->
    <header class="topbar">
      <button class="btn-menu-toggle" id="btn-menu-toggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbar-title">Selecciona un reporte</span>
    </header>

    <!-- Bienvenida -->
    <div class="welcome-screen" id="welcome-screen">
      <div class="welcome-content">
        <svg width="64" height="64" viewBox="0 0 40 40" fill="none" style="margin-bottom:1rem">
          <rect width="40" height="40" rx="10" fill="#E6F1FB"/>
          <rect x="8" y="12" width="24" height="3" rx="1.5" fill="#185FA5"/>
          <rect x="8" y="19" width="16" height="3" rx="1.5" fill="#185FA5" opacity="0.7"/>
          <rect x="8" y="26" width="20" height="3" rx="1.5" fill="#185FA5" opacity="0.5"/>
        </svg>
        <h2>Bienvenido al Portal de Reportes</h2>
        <p>Selecciona un reporte del menú lateral para visualizarlo aquí.</p>
      </div>
    </div>

    <!-- Iframe del reporte -->
    <div class="report-container" id="report-container" style="display:none">
      <div class="report-header">
        <div>
          <p class="report-category" id="report-category">Categoría</p>
          <h2 class="report-title" id="report-title">Nombre del Reporte</h2>
        </div>
      </div>
      <div class="iframe-wrapper">
        <iframe id="report-iframe" src="" frameborder="0" allowFullScreen="true"></iframe>
      </div>
    </div>
  </main>

  <!-- Overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="js/reports.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
