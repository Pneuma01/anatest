<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANA · Portal de Reportes</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="dashboard-page">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="ANA_logo.png" alt="ANA" class="sidebar-logo-img" />
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">U</div>
        <span class="user-email" id="user-email">Cargando...</span>
      </div>
      <button class="btn-logout" id="btn-logout" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <button class="btn-menu-toggle" id="btn-menu-toggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbar-title">Selecciona un reporte</span>
    </header>

    <!-- Bienvenida -->
    <div class="welcome-screen" id="welcome-screen">
      <div class="welcome-content">
        <img src="ANA_logo.png" alt="ANA" class="welcome-logo" />
        <p class="welcome-tagline">Ilumina tus decisiones con datos</p>
        <p class="welcome-hint">Selecciona un reporte del menú lateral para comenzar.</p>
      </div>
    </div>

    <!-- Reporte -->
    <div class="report-container" id="report-container" style="display:none">
      <div class="report-header">
        <div>
          <p class="report-category" id="report-category">Categoría</p>
          <h2 class="report-title" id="report-title">Nombre del Reporte</h2>
        </div>
      </div>
      <div class="iframe-wrapper">
        <iframe id="report-iframe" src="" frameborder="0" allowFullScreen="true"></iframe>
      </div>
    </div>
  </main>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <script src="js/reports.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
