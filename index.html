<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANA · Portal de Reportes</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="login-page">

  <div class="login-bg-glow"></div>

  <div class="login-card">
    <div class="login-logo">
      <img src="img/ANA_marca.jpg" alt="ANA – Ilumina tus decisiones" class="logo-img" />
    </div>
    <p class="login-subtitle">Portal de Reportes</p>
    <p class="login-hint">Ingresa con tu cuenta para continuar</p>
    <button class="btn-login" data-netlify-identity-button>Iniciar sesión</button>
  </div>

  <script>
    netlifyIdentity.on('login', () => {
      window.location.href = '/dashboard.html';
    });
    netlifyIdentity.on('init', user => {
      if (user) window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
