<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Reportes</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#185FA5"/>
        <rect x="8" y="12" width="24" height="3" rx="1.5" fill="white"/>
        <rect x="8" y="19" width="16" height="3" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="8" y="26" width="20" height="3" rx="1.5" fill="white" opacity="0.5"/>
      </svg>
    </div>
    <h1>Portal de Reportes</h1>
    <p class="login-subtitle">Ingresa con tu cuenta para continuar</p>
    <button class="btn-login" data-netlify-identity-button>Iniciar sesión</button>
  </div>

  <script>
    netlifyIdentity.on('login', () => {
      window.location.href = '/dashboard.html';
    });
    netlifyIdentity.on('init', user => {
      if (user) window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
